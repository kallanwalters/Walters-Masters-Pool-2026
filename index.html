<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters Pool 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR STYLES EXACTLY THE SAME */
:root {
  --green:#1a3d2b;--green-mid:#2d6a4f;--green-light:#40916c;
  --gold:#c9a84c;--gold-light:#e9c46a;
  --cream:#faf7f2;--cream-dark:#f0ebe1;
  --text:#1c1c1c;--text-muted:#6b6560;
  --under:#1a6b3c;--over:#8b1a1a;
  --card-bg:#ffffff;--border:rgba(26,61,43,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);}
.page{max-width:900px;margin:auto;padding:2rem 1rem;}
header{text-align:center;margin-bottom:2rem;}
h1{font-family:'Playfair Display',serif;color:var(--green);}
.status-pill{padding:6px 12px;border-radius:20px;font-size:12px;}
.loading{background:#fef8ec;}
.live{background:#edf7f0;}
.error{background:#fdf0f0;}
.lb-row{display:grid;grid-template-columns:40px 1fr 80px 50px 50px 50px 50px;padding:8px;border-bottom:1px solid #ddd;}
.under{color:green;} .over{color:red;} .even{color:#777;}
</style>
</head>

<body>
<div class="page">

<header>
  <h1>Masters Pool 2026</h1>
</header>

<div class="status-pill loading" id="status">Loading…</div>

<div id="leaderboard"></div>

</div>

<script>
/* =========================
   TEAMS
========================= */
const TEAMS = {
  Chase:['Scottie Scheffler','Tommy Fleetwood','Cameron Young','Hideki Matsuyama','Jordan Spieth','Brooks Koepka'],
  Kaden:['Bryson DeChambeau','Jon Rahm','Matt Fitzpatrick','Jason Day','Sam Burns','Tyrrell Hatton'],
  Kallan:['Xander Schauffele','Ludvig Aberg','Robert MacIntyre','Patrick Reed','Min Woo Lee','Jacob Bridgeman'],
  Pops:['Rory McIlroy','Justin Rose','Viktor Hovland','Chris Gotterup','J.J. Spaun','Maverick McNealy']
};

/* =========================
   HELPERS
========================= */
function fmt(s){
  if(s===null)return '-';
  if(s===0)return 'E';
  return s<0?`(${s})`:`+${s}`;
}

function normalize(name){
  return name.toLowerCase().replace(/[^a-z]/g,'');
}

function matchPlayer(name){
  const n = normalize(name);
  for(const team of Object.values(TEAMS)){
    for(const p of team){
      if(normalize(p)===n) return p;
    }
  }
  return null;
}

/* =========================
   FETCH REAL DATA (ESPN)
========================= */
async function fetchScores(){
  document.getElementById('status').innerText = 'Fetching live scores...';

  try{
    const res = await fetch('https://site.web.api.espn.com/apis/v2/sports/golf/pga/leaderboard');
    const data = await res.json();

    const scores = {};

    const players = data.events?.[0]?.competitions?.[0]?.competitors || [];

    players.forEach(p=>{
      const name = matchPlayer(p.athlete.displayName);
      if(!name) return;

      scores[name] = {
        r1: p.linescores?.[0]?.value ?? null,
        r2: p.linescores?.[1]?.value ?? null,
        r3: p.linescores?.[2]?.value ?? null,
        r4: p.linescores?.[3]?.value ?? null
      };
    });

    render(scores);

    document.getElementById('status').innerText = 'Live';
    document.getElementById('status').className = 'status-pill live';

  }catch(err){
    console.error(err);
    document.getElementById('status').innerText = 'Error loading scores';
    document.getElementById('status').className = 'status-pill error';
  }
}

/* =========================
   SCORING LOGIC
========================= */
function best4(players, scores, round){
  const vals = players.map(p=>scores[p]?.[round]).filter(v=>v!==null);
  if(!vals.length) return null;
  return vals.sort((a,b)=>a-b).slice(0,4).reduce((a,b)=>a+b,0);
}

/* =========================
   RENDER
========================= */
function render(scores){
  const rounds = ['r1','r2','r3','r4'];

  const teams = Object.entries(TEAMS).map(([name,players])=>{
    const roundTotals = rounds.map(r=>best4(players,scores,r));
    const total = roundTotals.filter(v=>v!==null).reduce((a,b)=>a+b,0);
    return {name,players,roundTotals,total};
  });

  teams.sort((a,b)=>a.total-b.total);

  document.getElementById('leaderboard').innerHTML = teams.map((t,i)=>`
    <div class="lb-row">
      <div>${i+1}</div>
      <div>${t.name}</div>
      <div>${fmt(t.total)}</div>
      ${t.roundTotals.map(r=>`<div>${fmt(r)}</div>`).join('')}
    </div>
  `).join('');
}

/* =========================
   INIT
========================= */
fetchScores();
setInterval(fetchScores, 60000); // auto refresh every 60s

</script>
</body>
</html>
