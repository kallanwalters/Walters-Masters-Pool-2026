<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters Pool 2026</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

#status {
  text-align: center;
  margin-bottom: 15px;
  font-weight: bold;
}

.table {
  max-width: 800px;
  margin: auto;
  background: white;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #ddd;
}

.row {
  display: grid;
  grid-template-columns: 40px 1fr 80px 60px 60px 60px 60px;
  padding: 10px;
  border-bottom: 1px solid #eee;
}

.header {
  background: #1a3d2b;
  color: #e9c46a;
  font-weight: bold;
}

.under { color: green; }
.over { color: red; }
.even { color: #777; }
</style>
</head>

<body>

<h1>Masters Pool 2026</h1>
<div id="status">Loading...</div>

<div class="table">
  <div class="row header">
    <div>#</div><div>Team</div><div>Total</div>
    <div>R1</div><div>R2</div><div>R3</div><div>R4</div>
  </div>
  <div id="board"></div>
</div>

<script>
/* =====================
   TEAMS
===================== */
const TEAMS = {
  Chase:['Scottie Scheffler','Tommy Fleetwood','Cameron Young','Hideki Matsuyama','Jordan Spieth','Brooks Koepka'],
  Kaden:['Bryson DeChambeau','Jon Rahm','Matt Fitzpatrick','Jason Day','Sam Burns','Tyrrell Hatton'],
  Kallan:['Xander Schauffele','Ludvig Aberg','Robert MacIntyre','Patrick Reed','Min Woo Lee','Jacob Bridgeman'],
  Pops:['Rory McIlroy','Justin Rose','Viktor Hovland','Chris Gotterup','J.J. Spaun','Maverick McNealy']
};

/* =====================
   HELPERS
===================== */
function formatScore(s){
  if(s === null) return '-';
  if(s === 0) return '<span class="even">E</span>';
  return s < 0 ? `<span class="under">${s}</span>` : `<span class="over">+${s}</span>`;
}

function normalize(name){
  return name.toLowerCase().replace(/[^a-z]/g,'');
}

function matchPlayer(name){
  const n = normalize(name);
  for(const team of Object.values(TEAMS)){
    for(const p of team){
      if(normalize(p) === n) return p;
    }
  }
  return null;
}

/* =====================
   FETCH SCORES
===================== */
async function fetchScores(){
  document.getElementById('status').innerText = 'Fetching live scores...';

  try {
    const res = await fetch('https://api.allorigins.win/raw?url=https://site.web.api.espn.com/apis/v2/sports/golf/pga/leaderboard');
    const data = await res.json();

    const scores = {};
    const players = data.events?.[0]?.competitions?.[0]?.competitors || [];

    players.forEach(p => {
      const name = matchPlayer(p.athlete.displayName);
      if(!name) return;

      scores[name] = {
        r1: p.linescores?.[0]?.value ?? null,
        r2: p.linescores?.[1]?.value ?? null,
        r3: p.linescores?.[2]?.value ?? null,
        r4: p.linescores?.[3]?.value ?? null
      };
    });

    render(scores);

    document.getElementById('status').innerText = 'Live';

  } catch (err) {
    console.error(err);
    document.getElementById('status').innerText = 'Error loading scores';
  }
}

/* =====================
   SCORING
===================== */
function best4(players, scores, round){
  const vals = players.map(p => scores[p]?.[round]).filter(v => v !== null);
  if(!vals.length) return null;
  return vals.sort((a,b)=>a-b).slice(0,4).reduce((a,b)=>a+b,0);
}

/* =====================
   RENDER
===================== */
function render(scores){
  const rounds = ['r1','r2','r3','r4'];

  const teams = Object.entries(TEAMS).map(([name, players]) => {
    const roundTotals = rounds.map(r => best4(players, scores, r));
    const total = roundTotals.filter(v => v !== null).reduce((a,b)=>a+b,0);
    return { name, roundTotals, total };
  });

  teams.sort((a,b)=>a.total - b.total);

  document.getElementById('board').innerHTML = teams.map((t,i)=>`
    <div class="row">
      <div>${i+1}</div>
      <div>${t.name}</div>
      <div>${formatScore(t.total)}</div>
      ${t.roundTotals.map(r=>`<div>${formatScore(r)}</div>`).join('')}
    </div>
  `).join('');
}

/* =====================
   INIT
===================== */
fetchScores();
setInterval(fetchScores, 60000);

</script>

</body>
</html>
